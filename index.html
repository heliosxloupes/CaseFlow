<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="CaseFlow">
<title>CaseFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--bg1:#0d1119;--bg2:#131922;--bg3:#1a2130;
  --line:rgba(255,255,255,0.055);--line2:rgba(255,255,255,0.10);--line3:rgba(255,255,255,0.16);
  --text:#e8edf4;--text2:#6b7d96;--text3:#384557;
  --blue:#4f8ef7;--blue-d:rgba(79,142,247,0.14);--blue-b:rgba(79,142,247,0.22);
  --green:#34d399;--green-d:rgba(52,211,153,0.11);
  --red:#f87171;--amber:#fbbf24;
  --r:12px;--rl:18px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;background:var(--bg)}
body{min-height:100%;font-family:'Sora',sans-serif;color:var(--text);background:var(--bg);overflow-x:hidden}
.page{display:none;min-height:100vh;flex-direction:column}
.page.on{display:flex}
#pg-login{align-items:center;justify-content:center;padding:48px 28px}
.login-wrap{width:100%;max-width:360px}
.brand{text-align:center;margin-bottom:56px}
.brand-name{font-size:34px;font-weight:700;letter-spacing:-2px}
.brand-name em{font-style:normal;color:var(--blue)}
.brand-tag{font-size:11px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-top:7px}
.lbl{display:block;font-size:11px;color:var(--text2);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
.ifield{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);padding:15px 16px;color:var(--text);font-family:'Sora',sans-serif;font-size:15px;outline:none;transition:border-color .18s,background .18s;margin-bottom:13px}
.ifield:focus{border-color:var(--blue);background:var(--bg3)}
.ifield::placeholder{color:var(--text3)}
.btn-main{width:100%;padding:16px;background:var(--blue);border:none;border-radius:var(--r);color:#fff;font-family:'Sora',sans-serif;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:-.2px;transition:opacity .15s,transform .1s;margin-top:4px}
.btn-main:active{opacity:.87;transform:scale(.985)}
.btn-main.busy{opacity:.55;pointer-events:none}
.login-note{text-align:center;margin-top:32px;font-size:12px;color:var(--text3);line-height:1.7}
.login-err{text-align:center;font-size:13px;color:var(--red);margin-top:11px;min-height:18px}
#pg-app{background:var(--bg)}
.app-bar{display:flex;align-items:center;justify-content:space-between;padding:15px 20px 13px;border-bottom:1px solid var(--line);background:rgba(7,9,15,.95);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);position:sticky;top:0;z-index:60}
.app-logo{font-size:19px;font-weight:700;letter-spacing:-1px}
.app-logo em{font-style:normal;color:var(--blue)}
.bar-right{display:flex;align-items:center;gap:9px}
.chip{background:var(--bg2);border:1px solid var(--line2);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2)}
.chip b{color:var(--blue);font-weight:600}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--line2);border-radius:20px;padding:5px 12px 5px 8px;font-size:12px;color:var(--text2);cursor:pointer}
.udot{width:7px;height:7px;background:var(--green);border-radius:50%;flex-shrink:0}
.tabs{display:flex;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:56px;z-index:50}
.tab{flex:1;padding:14px 0;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Sora',sans-serif;transition:color .15s,border-color .15s}
.tab.on{color:var(--text);border-bottom-color:var(--blue)}
.pane{display:none;width:100%}
.pane.on{display:block;min-height:calc(100vh - 112px)}
.voice-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:calc(100vh - 112px);
  width:100%;
  padding:24px;
}
.orb-wrap{
  position:relative;
  width:clamp(260px, 40vmin, 420px);
  height:clamp(260px, 40vmin, 420px);
  margin-bottom:36px;
  cursor:pointer;flex-shrink:0;transition:transform .2s;
}
.orb-wrap:active{transform:scale(.96)}
.orb-wrap.inactive{opacity:.35;pointer-events:none}
canvas#orb-canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:50%}
.orb-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;pointer-events:none;transition:opacity .3s}
.orb-hint.hide{opacity:0}
.orb-hint svg{width:52px;height:52px;fill:rgba(255,255,255,.5)}
.orb-hint span{font-size:13px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;font-weight:500}
.question-bubble{background:var(--bg2);border:1px solid var(--line2);border-radius:20px 20px 20px 4px;padding:16px 20px;font-size:17px;font-weight:400;color:var(--text);line-height:1.55;text-align:left;max-width:min(380px,90vw);width:100%;margin-bottom:16px;min-height:52px;opacity:0;transform:translateY(6px);transition:opacity .35s,transform .35s}
.question-bubble.show{opacity:1;transform:translateY(0)}
.answer-chips{display:flex;flex-wrap:wrap;gap:8px;max-width:min(380px,90vw);width:100%;margin-bottom:16px;opacity:0;transition:opacity .3s .1s}
.answer-chips.show{opacity:1}
.answer-input-wrap{display:flex;gap:8px;max-width:min(380px,90vw);width:100%;margin-bottom:16px;opacity:0;transition:opacity .3s .1s}
.answer-input-wrap.show{opacity:1}
.voice-answer-row{display:flex;align-items:center;gap:12px;max-width:min(380px,90vw);width:100%;margin-bottom:12px;opacity:0;transition:opacity .3s .15s}
.voice-answer-row.show{opacity:1}
.cpt-search-box{max-width:min(380px,90vw);width:100%;margin-bottom:12px;opacity:0;transition:opacity .3s .1s}
.cpt-search-box.show{opacity:1}
.cpt-found-box{background:var(--blue-d);border:1px solid var(--blue-b);border-radius:var(--r);padding:14px 16px;max-width:min(380px,90vw);width:100%;margin-bottom:12px;opacity:0;transition:opacity .3s}
.cpt-found-box.show{opacity:1}
.cpt-select-box{max-width:min(380px,90vw);width:100%;margin-bottom:12px;opacity:0;transition:opacity .3s .1s}
.cpt-select-box.show{opacity:1}
.add-more-box{max-width:min(380px,90vw);width:100%;margin-bottom:12px;opacity:0;transition:opacity .3s .1s}
.add-more-box.show{opacity:1}
.summary-card{background:var(--bg1);border:1px solid var(--line);border-radius:var(--rl);overflow:hidden;max-width:min(380px,90vw);width:100%;margin-bottom:16px;opacity:0;transition:opacity .4s}
.summary-card.show{opacity:1}
.final-actions{display:flex;gap:10px;max-width:min(380px,90vw);width:100%;margin-top:4px;opacity:0;transition:opacity .3s .1s}
.final-actions.show{opacity:1}

.chip-opt{background:var(--bg2);border:1px solid var(--line2);border-radius:20px;padding:9px 16px;font-size:13px;color:var(--text2);cursor:pointer;font-family:'Sora',sans-serif;font-weight:500;transition:background .15s,border-color .15s,color .15s}
.chip-opt:active,.chip-opt.selected{background:var(--blue-d);border-color:var(--blue);color:var(--blue)}

.answer-text-input{flex:1;background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);padding:12px 14px;color:var(--text);font-family:'Sora',sans-serif;font-size:15px;outline:none;transition:border-color .18s}
.answer-text-input:focus{border-color:var(--blue)}
.answer-text-input::placeholder{color:var(--text3)}
.send-btn{background:var(--blue);border:none;border-radius:var(--r);padding:12px 16px;cursor:pointer;color:#fff;font-size:18px;transition:opacity .15s}
.send-btn:active{opacity:.8}

.mic-small-btn{width:48px;height:48px;border-radius:50%;background:var(--bg3);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;flex-shrink:0}
.mic-small-btn.rec{background:rgba(248,113,113,.12);border-color:var(--red)}
.mic-small-btn svg{width:20px;height:20px;fill:var(--text2);transition:fill .15s}
.mic-small-btn.rec svg{fill:var(--red)}
.voice-answer-tx{flex:1;font-size:14px;color:var(--text2);font-style:italic;min-height:20px;line-height:1.4}
.voice-answer-tx.has-text{color:var(--text);font-style:normal}

.srch-wrap{position:relative}
.srch-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
.srch-ico svg{width:15px;height:15px;fill:var(--text2)}
.srch-field{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;padding:11px 12px 11px 35px;color:var(--text);font-family:'Sora',sans-serif;font-size:14px;outline:none;transition:border-color .18s}
.srch-field:focus{border-color:var(--blue)}
.srch-field::placeholder{color:var(--text3)}
.srch-results{margin-top:8px;max-height:240px;overflow-y:auto;border-radius:var(--r);background:var(--bg2);border:1px solid var(--line2)}
.srch-row{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s}
.srch-row:last-child{border-bottom:none}
.srch-row:active,.srch-row:hover{background:var(--bg3)}
.srch-code{font-size:12px;color:var(--blue);font-weight:600;min-width:46px;padding-top:2px}
.srch-info{flex:1}
.srch-desc{font-size:13px;color:var(--text);line-height:1.35}
.srch-area{font-size:11px;color:var(--text3);margin-top:2px}
.srch-add{font-size:18px;color:var(--text3);padding-top:2px}
.no-results{padding:14px;font-size:13px;color:var(--text3);text-align:center}
.srch-count{padding:8px 14px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--line)}

.cpt-found-label{font-size:10px;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:10px}
.cpt-found-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.cpt-found-item:last-child{border-bottom:none}
.cpt-found-code{font-size:12px;font-weight:600;color:var(--blue);min-width:46px;padding-top:2px}
.cpt-found-desc{flex:1;font-size:13px;color:var(--text);line-height:1.35}

.cpt-select-head{font-size:14px;color:var(--text);font-weight:500;margin-bottom:12px;line-height:1.5}
.cpt-select-option{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,background .15s}
.cpt-select-option:active,.cpt-select-option:hover{border-color:var(--blue);background:var(--bg3)}
.cpt-select-option.picked{border-color:var(--green);background:var(--green-d)}
.cpt-select-option.picked .cpt-sel-code{color:var(--green)}
.cpt-check{float:right;width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s;flex-shrink:0;margin-left:8px}
.cpt-select-option.picked .cpt-check{background:var(--green);border-color:var(--green)}
.cpt-check-inner{width:10px;height:10px;opacity:0;transition:opacity .15s}
.cpt-select-option.picked .cpt-check-inner{opacity:1}
.cpt-confirm-btn{width:100%;padding:14px;background:var(--blue);border:none;border-radius:var(--r);color:#fff;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;opacity:0;transition:opacity .2s,transform .1s;pointer-events:none}
.cpt-confirm-btn.visible{opacity:1;pointer-events:all}
.cpt-confirm-btn:active{transform:scale(.98)}

.add-more-head{font-size:14px;color:var(--text);font-weight:500;margin-bottom:12px;line-height:1.5}
.add-more-row{display:flex;gap:10px;margin-bottom:10px}
.add-more-btn{flex:1;padding:12px;border-radius:var(--r);font-family:'Sora',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--line2);background:var(--bg2);color:var(--text2);display:flex;align-items:center;justify-content:center;gap:8px;transition:border-color .15s,color .15s}
.add-more-btn:active{background:var(--bg3)}
.add-more-btn svg{width:16px;height:16px;fill:currentColor;flex-shrink:0}
.add-more-skip{width:100%;padding:11px;background:transparent;border:1px solid var(--line2);border-radius:var(--r);color:var(--text3);font-family:'Sora',sans-serif;font-size:13px;cursor:pointer;transition:color .15s}
.done-btn{width:100%;padding:16px;background:var(--green);border:none;border-radius:var(--r);color:#071a10;font-family:'Sora',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s,transform .1s;letter-spacing:-.2px}
.done-btn:active{opacity:.85;transform:scale(.98)}
.codes-review{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.codes-review-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)}
.codes-review-item:last-child{border-bottom:none}
.cri-code{font-size:12px;color:var(--blue);font-weight:600;min-width:46px}
.cri-desc{flex:1;font-size:13px;color:var(--text);line-height:1.3}
.cri-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 2px;transition:color .15s}
.cri-remove:hover{color:var(--red)}
.cpt-sel-code{font-size:12px;font-weight:600;color:var(--blue);margin-bottom:4px}
.cpt-sel-name{font-size:14px;color:var(--text);font-weight:500;margin-bottom:4px}
.cpt-sel-note{font-size:12px;color:var(--text2);line-height:1.5}
.state-label{font-size:15px;color:var(--text3);margin-top:8px;min-height:22px;letter-spacing:.02em;text-align:center}

.sum-row{display:flex;align-items:flex-start;padding:12px 16px;border-bottom:1px solid var(--line);gap:12px}
.sum-row:last-child{border-bottom:none}
.sum-lbl{font-size:11px;color:var(--text3);min-width:80px;padding-top:2px;flex-shrink:0}
.sum-val{font-size:14px;color:var(--text);flex:1;font-weight:500;line-height:1.4}
.sum-val.empty{color:var(--text3);font-weight:400;font-style:italic}

.btn-redo{flex:1;padding:14px;background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);color:var(--text2);font-family:'Sora',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
.btn-go{flex:2;padding:14px;background:var(--green);border:none;border-radius:var(--r);color:#071a10;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-go:active{opacity:.85}
.btn-go:disabled{opacity:.35;pointer-events:none}
.hist-wrap{padding:20px 20px 40px;max-width:600px;margin:0 auto}
.hist-item{background:var(--bg1);border:1px solid var(--line);border-radius:var(--rl);padding:16px 18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start}
.hprocs{font-size:14px;font-weight:500;margin-bottom:5px;line-height:1.4}
.hmeta{font-size:12px;color:var(--text2);line-height:1.75}
.spill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;margin-left:12px;flex-shrink:0}
.s-submitted{background:var(--green-d);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.empty{text-align:center;padding:60px 20px}
.empty svg{width:44px;height:44px;margin:0 auto 14px;opacity:.12;display:block}
.empty p{font-size:14px;color:var(--text3);line-height:1.65}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:rot .65s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes rot{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--bg3);border:1px solid var(--line2);border-radius:24px;padding:11px 20px;font-size:13px;color:var(--text);font-weight:500;opacity:0;transition:all .22s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(52,211,153,.28);color:var(--green)}
.toast.err{border-color:rgba(248,113,113,.28);color:var(--red)}
.new-case-btn{display:flex;align-items:center;gap:5px;background:var(--blue-d);border:1px solid var(--blue-b);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--blue);font-family:'Sora',sans-serif;font-weight:500;cursor:pointer;transition:background .15s}
</style>
</head>
<body>
<div class="page on" id="pg-login">
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-name">Case<em>Flow</em></div>
      <div class="brand-tag">ACGME Case Logging</div>
    </div>
    <label class="lbl">Email</label>
    <input class="ifield" type="email" id="l-email" placeholder="you@hospital.com" autocomplete="email" autocapitalize="none">
    <label class="lbl">Password</label>
    <input class="ifield" type="password" id="l-pass" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;" autocomplete="current-password">
    <button class="btn-main" id="l-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="l-err"></div>
    <div class="login-note">Sign in with your ACGME credentials.<br>Your session is stored locally on this device.</div>
  </div>
</div>

<div class="page" id="pg-app">
  <div class="app-bar">
    <div class="app-logo" onclick="resetFlow()" style="cursor:pointer">Case<em>Flow</em></div>
    <div class="bar-right">
      <div class="chip"><b id="hdr-n">0</b> cases</div>
      <button class="new-case-btn" id="new-case-btn" onclick="resetFlow()" style="display:none">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Case
      </button>
      <div class="user-chip" onclick="doLogout()"><div class="udot"></div><span id="hdr-u">&#8212;</span></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tb-log" onclick="goTab('log')">Log Case</button>
    <button class="tab" id="tb-history" onclick="goTab('history')">History</button>
  </div>
  <div class="pane on" id="pn-log">
    <div class="voice-screen" id="voice-screen">
      <div class="orb-wrap" id="orb-wrap" onclick="handleOrbTap()">
        <canvas id="orb-canvas" width="480" height="480"></canvas>
        <div class="orb-hint" id="orb-hint">
          <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1.5 14.9A7.002 7.002 0 0 1 5 9H3a9 9 0 0 0 8 8.94V20H8v2h8v-2h-3v-2.06A9 9 0 0 0 21 9h-2a7 7 0 0 1-5.5 6.9z"/></svg>
          <span>Tap to start</span>
        </div>
      </div>
      <div class="question-bubble" id="q-bubble"></div>
      <div class="answer-chips" id="a-chips"></div>
      <div class="cpt-search-box" id="cpt-search-box">
        <div class="srch-wrap">
          <div class="srch-ico"><svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg></div>
          <input class="srch-field" id="cpt-search-input" placeholder="Type procedure name or CPT code&#8230;" oninput="liveSearch(this.value)">
        </div>
        <div class="srch-results" id="srch-results-box"></div>
      </div>
      <div class="answer-input-wrap" id="a-text-wrap">
        <input class="answer-text-input" id="a-text-input" placeholder="Type your answer&#8230;" onkeydown="if(event.key==='Enter')submitTextAnswer()">
        <button class="send-btn" onclick="submitTextAnswer()">&#8593;</button>
      </div>
      <div class="voice-answer-row" id="a-voice-row">
        <div class="mic-small-btn" id="mic-small" onclick="toggleFollowUpRec()">
          <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1.5 14.9A7.002 7.002 0 0 1 5 9H3a9 9 0 0 0 8 8.94V20H8v2h8v-2h-3v-2.06A9 9 0 0 0 21 9h-2a7 7 0 0 1-5.5 6.9z"/></svg>
        </div>
        <div class="voice-answer-tx" id="a-voice-tx">Tap mic or type above</div>
      </div>
      <div class="cpt-found-box" id="cpt-found-box"></div>

<script>
// CPT_DB and KW_MAP loaded from caseflow-data.js — 4761 ACGME Plastic Surgery codes
// Build lookup index
let CPT_INDEX=null;
function buildIndex(){
  if(CPT_INDEX)return;
  if(typeof CPT_DB === 'undefined'){console.warn('CPT_DB not loaded yet');return;}
  CPT_INDEX=CPT_DB.map(([c,d,a])=>({c,d,a,search:(c+' '+d+' '+a).toLowerCase()}));
}
function searchCPT(query,limit=12){
  buildIndex();
  if(!CPT_INDEX)return[];
  const q=query.toLowerCase().trim();
  if(!q)return[];
  const terms=q.split(/\s+/);
  const results=[];
  for(const entry of CPT_INDEX){
    if(entry.c===q){results.unshift(entry);continue}
    if(terms.every(t=>entry.search.includes(t))){
      results.push(entry);
    }
  }
  return results.slice(0,limit);
}
function kwMatch(text){
  const lo=text.toLowerCase();
  const matched=[];
  buildIndex();
  if(typeof KW_MAP === 'undefined')return[];
  for(const[type,codes]of Object.entries(KW_MAP)){
    const typeWords=type.toLowerCase().split(/[\s\/,()+\-]+/).filter(w=>w.length>3);
    if(typeWords.some(w=>lo.includes(w))){
      for(const code of codes.slice(0,3)){
        const e=CPT_INDEX.find(x=>x.c===code);
        if(e&&!matched.find(m=>m.c===code))matched.push(e);
      }
    }
  }
  return matched.slice(0,5);
}
// ORB
const canvas=document.getElementById('orb-canvas');
const ctx=canvas.getContext('2d');
const W=480,H=480,CX=W/2,CY=H/2;
let orbState='idle',audioLevel=0,smoothLevel=0,analyser=null,dataArray=null,animFrame=null;
const N=10;
let bAngles=Array.from({length:N},(_,i)=>i*(2*Math.PI/N));
let bNoise=Array.from({length:N},()=>Math.random()*1000);
const PAL={idle:['#1a2a50','#1e3568','#243f80'],listening:['#4f8ef7','#6fa8ff','#a78bfa'],thinking:['#a78bfa','#c084fc','#818cf8'],done:['#34d399','#6ee7b7','#10b981']};
let lastTs=0;
function drawOrb(ts){
  ctx.clearRect(0,0,W,H);
  const t=ts*0.0007,pal=PAL[orbState];
  const base=orbState==='idle'?100:112;
  const R=base+smoothLevel*(orbState==='listening'?48:orbState==='thinking'?28:0);
  for(let layer=2;layer>=0;layer--){
    const sc=1-layer*.085;
    const sp=orbState==='listening'?4:orbState==='thinking'?6:1.2;
    const amp=orbState==='listening'?20+smoothLevel*55:orbState==='thinking'?15+Math.sin(ts*.003)*10:8+Math.sin(ts*.0005+layer)*4;
    ctx.beginPath();
    const pts=[];
    for(let i=0;i<N;i++){
      const n=Math.sin(bNoise[i]+t*sp+layer*.5)*Math.cos(bNoise[i]*.7+t*sp*.6);
      pts.push([CX+Math.cos(bAngles[i])*(R*sc+n*amp),CY+Math.sin(bAngles[i])*(R*sc+n*amp)]);
    }
    ctx.moveTo((pts[0][0]+pts[N-1][0])/2,(pts[0][1]+pts[N-1][1])/2);
    for(let i=0;i<N;i++){const c=pts[i],nx=pts[(i+1)%N];ctx.quadraticCurveTo(c[0],c[1],(c[0]+nx[0])/2,(c[1]+nx[1])/2)}
    ctx.closePath();
    const g=ctx.createRadialGradient(CX-R*.25,CY-R*.28,R*.06,CX,CY,R*sc*1.15);
    g.addColorStop(0,pal[layer%pal.length]);g.addColorStop(1,pal[(layer+2)%pal.length]);
    ctx.globalAlpha=.58+layer*.16;ctx.fillStyle=g;ctx.fill();
  }
  // Outer glow — bigger and softer when listening
  const glowR = orbState==='listening' ? R*1.7 : R*1.5;
  const gc=orbState==='listening'?'rgba(79,142,247,':orbState==='thinking'?'rgba(167,139,250,':'rgba(26,50,110,';
  const glowAlpha=orbState==='listening'?(.22+smoothLevel*.15):'.14';
  const gr=ctx.createRadialGradient(CX,CY,R*.65,CX,CY,glowR);
  gr.addColorStop(0,gc+glowAlpha+')');gr.addColorStop(1,gc+'0)');
  ctx.globalAlpha=1;ctx.beginPath();ctx.arc(CX,CY,glowR,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
  // Secondary inner glow ring when listening
  if(orbState==='listening'&&smoothLevel>.1){
    const ring=ctx.createRadialGradient(CX,CY,R*.85,CX,CY,R*1.15);
    ring.addColorStop(0,'rgba(127,183,255,0)');
    ring.addColorStop(.5,`rgba(127,183,255,${(smoothLevel*.18).toFixed(2)})`);
    ring.addColorStop(1,'rgba(127,183,255,0)');
    ctx.beginPath();ctx.arc(CX,CY,R*1.15,0,Math.PI*2);ctx.fillStyle=ring;ctx.fill();
  }
  // Specular highlight
  const hl=ctx.createRadialGradient(CX-R*.32,CY-R*.38,0,CX-R*.32,CY-R*.38,R*.55);
  hl.addColorStop(0,'rgba(255,255,255,.14)');hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fillStyle=hl;ctx.globalAlpha=1;ctx.fill();
  ctx.globalAlpha=1;
}
function readMic(){if(!analyser){audioLevel=0;return}analyser.getByteFrequencyData(dataArray);let s=0;for(let i=0;i<dataArray.length;i++)s+=dataArray[i];audioLevel=Math.min(1,(s/dataArray.length)/42)}
function orbLoop(ts){
  const dt=Math.min(ts-lastTs,50)/1000;lastTs=ts;readMic();
  const tgt=orbState==='listening'?audioLevel:orbState==='thinking'?.5+Math.sin(ts*.0025)*.35:0;
  smoothLevel+=(tgt-smoothLevel)*(orbState==='listening'?.38:.06);
  const spd=orbState==='listening'?.005:orbState==='thinking'?.007:.0012;
  for(let i=0;i<N;i++)bAngles[i]+=spd*(i%2===0?1:-1)*(1+smoothLevel*.6);
  drawOrb(ts);animFrame=requestAnimationFrame(orbLoop);
}
function startOrb(){if(animFrame)cancelAnimationFrame(animFrame);lastTs=performance.now();animFrame=requestAnimationFrame(orbLoop)}
// MIC
let micStream=null,audioCtx2=null;
async function startMic(stream){
  micStream=stream;audioCtx2=new(window.AudioContext||window.webkitAudioContext)();
  const src=audioCtx2.createMediaStreamSource(stream);
  analyser=audioCtx2.createAnalyser();analyser.fftSize=64;
  dataArray=new Uint8Array(analyser.frequencyBinCount);src.connect(analyser);
}
function stopMic(){if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null}if(audioCtx2){audioCtx2.close();audioCtx2=null}analyser=null;dataArray=null;audioLevel=0}
// SPEECH
let recObj=null,recOn=false,txFinal='',txInt='';
let fuRec=null,fuOn=false,fuFinal='',fuInt='';
function makeRec(onResult,onEnd){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();r.continuous=true;r.interimResults=true;r.lang='en-US';
  r.onresult=onResult;
  r.onerror=e=>{if(e.error==='not-allowed'||e.error==='permission-denied')toast('Mic access denied — allow mic in browser settings','err');else if(e.error!=='no-speech')toast('Mic error: '+e.error,'err')};
  if(onEnd)r.onend=onEnd;return r;
}
// CONVERSATION
let caseData={description:'',procedures:[],role:null,site:null,attending:null,patientType:null,caseYear:null,date:null,caseId:'',notes:''};
let pendingQs=[],currentQ=-1;
const QUESTIONS=[
  {key:'procedures',isEmpty:()=>caseData.procedures.length===0,question:"I couldn't identify the procedure. What was performed? Search by name or CPT code.",type:'cpt-search'},
  {key:'role',isEmpty:()=>!caseData.role,question:'What was your role in this case?',type:'chips',options:['Surgeon','Assistant','Teaching Assistant','Observer']},
  {key:'site',isEmpty:()=>!caseData.site,question:'At which hospital or site was this performed?',type:'chips',options:['Larkin Community Hospital','Larkin Palm Springs','Affiliated Site']},
  {key:'attending',isEmpty:()=>!caseData.attending,question:'Who was the attending physician?',type:'chips',options:['Dr. Smith','Dr. Johnson','Dr. Williams','Dr. Brown']},
  {key:'patientType',isEmpty:()=>!caseData.patientType,question:'Was this an adult or pediatric patient?',type:'chips',options:['Adult','Pediatric']},
  {key:'caseYear',isEmpty:()=>!caseData.caseYear,question:'What year of residency are you in?',type:'chips',options:['Year 1','Year 2','Year 3','Year 4','Year 5','Year 6']},
];
async function handleOrbTap(){
  if(document.getElementById('add-more-box').classList.contains('show')) return;
  if(orbState==='idle') await startInitialListening();
  else if(orbState==='listening') stopInitialListening();
}
async function startInitialListening(){
  try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});await startMic(stream)}
  catch(e){
    const msg = e && e.message ? e.message : (e && e.name ? e.name : String(e));
    showBubble('Mic error: ' + msg + ' — Check browser mic permission for this site, then refresh.');
    document.getElementById('q-bubble').classList.add('show');
    setStateLabel('Mic permission required');
    console.error('getUserMedia error:', e);
    return;
  }
  buildIndex();
  if(!recObj)recObj=makeRec(e=>{txInt='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)txFinal+=' '+e.results[i][0].transcript;else txInt+=e.results[i][0].transcript}showBubble((txFinal+' '+txInt).trim()||'Listening…')},()=>{if(recOn)recObj.start()});
  if(!recObj){showBubble('Speech recognition not supported in this browser — try Chrome on Android or Safari on iOS.');document.getElementById('q-bubble').classList.add('show');return}
  txFinal='';txInt='';recOn=true;
  try{recObj.start();}catch(e){console.error('recObj.start error:',e);showBubble('Mic start error: '+e.message);document.getElementById('q-bubble').classList.add('show');return;}
  orbState='listening';document.getElementById('orb-hint').classList.add('hide');
  showBubble('Describe your case…');setStateLabel('Tap orb to stop');hideAll();
  document.getElementById('q-bubble').classList.add('show');
  document.getElementById('new-case-btn').style.display='flex';
}
function stopInitialListening(){
  recOn=false;if(recObj)recObj.stop();stopMic();
  const text=(txFinal+' '+txInt).trim();
  if(!text){orbState='idle';document.getElementById('orb-hint').classList.remove('hide');showBubble('');setStateLabel('');return}
  orbState='thinking';showBubble('Finding your CPT codes…');setStateLabel('');
  processDescription(text);
}
async function processDescription(text){
  caseData.description=text;caseData.date=isoToday();buildIndex();
  let extracted=null;
  try{
    const res=await fetch('/api/parse-case',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({transcript:text,specialty:'plastic-surgery'})});
    if(!res.ok)throw new Error();extracted=await res.json()
  }
  catch(e){extracted=localExtract(text)}
  if(extracted.role)caseData.role=extracted.role;
  if(extracted.patientType)caseData.patientType=extracted.patientType;
  if(extracted.caseYear)caseData.caseYear='Year '+(extracted.caseYear||4);
  if(extracted.notes)caseData.notes=extracted.notes;
  if(extracted.suggestedCodes&&extracted.suggestedCodes.length){
    // Primary codes go straight into procedures
    const primaries = extracted.suggestedCodes.filter(s=>s.primary!==false);
    const alternatives = extracted.suggestedCodes.filter(s=>s.primary===false);
    caseData.procedures = primaries.map(s=>({c:s.code,d:s.desc,a:s.area}));
    caseData.alternatives = alternatives; // store for display
  }
  orbState='idle';

  // Auto-confirm the 1 primary per procedure; alternatives appear as tappable suggestions
  if(caseData.procedures.length) showCptFound(caseData.procedures);
  pendingQs=QUESTIONS.filter(q=>q.isEmpty()); currentQ=-1;
  await sleep(caseData.procedures.length ? 800 : 100);
  if(caseData.procedures.length){
    showAddMoreScreen();
    pendingQs=QUESTIONS.filter(q=>q.key!=='procedures'&&q.isEmpty());
    currentQ=-1;
  } else {
    nextQuestion();
  }
}
function localExtract(text){
  const lo=text.toLowerCase();
  const role=lo.includes('assist')?'Assistant':lo.includes('observer')?'Observer':'Surgeon';
  const pt=(lo.includes('pediatric')||lo.includes('child')||lo.includes('infant'))?'Pediatric':'Adult';
  const matched=kwMatch(lo);
  return{role,patientType:pt,caseYear:4,suggestedCodes:matched.map(e=>({code:e.c,desc:e.d,area:e.a}))};
}
function nextQuestion(){
  currentQ++;if(currentQ>=pendingQs.length){showSummary();return}
  const q=pendingQs[currentQ];hideAnswerUI();
  setTimeout(()=>{
    showBubble(q.question);document.getElementById('q-bubble').classList.add('show');
    if(q.type==='chips')showChips(q.options);
    else if(q.type==='cpt-search')showCptSearchPanel();
    else showTextAndVoice();
  },320);
}
function answerQuestion(value){
  const q=pendingQs[currentQ];if(!q)return;
  if(q.key==='caseYear')caseData.caseYear=value;else caseData[q.key]=value;
  hideAnswerUI();nextQuestion();
}
function showCptSearchPanel(){
  const box=document.getElementById('cpt-search-box');

}
function liveSearch(q){
  const box=document.getElementById('srch-results-box');

  const hits=searchCPT(q,12);
  if(!hits.length){box.innerHTML='<div class="no-results">No results — try a different term</div>';return}
  box.innerHTML=`<div class="srch-count">${hits.length} result${hits.length!==1?'s':''} — tap to add</div>`
    +hits.map(h=>`<div class="srch-row" onclick="addCptFromSearch('${h.c}','${esc(h.d)}','${esc(h.a)}')"><div class="srch-code">${h.c}</div><div class="srch-info"><div class="srch-desc">${h.d}</div><div class="srch-area">${h.a}</div></div><div class="srch-add">+</div></div>`).join('');
}
function addCptFromSearch(code,desc,area){
  if(!caseData.procedures.find(p=>p.c===code)){caseData.procedures.push({c:code,d:desc,a:area});showCptFound(caseData.procedures)}
  else toast('Code already added','');
  hideAnswerUI();nextQuestion();
}
function toggleFollowUpRec(){fuOn?stopFuRec():startFuRec()}
function startFuRec(){
  fuFinal='';fuInt='';
  if(!fuRec)fuRec=makeRec(e=>{fuInt='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fuFinal+=' '+e.results[i][0].transcript;else fuInt+=e.results[i][0].transcript}const d=(fuFinal+' '+fuInt).trim();const vtx=document.getElementById('a-voice-tx');vtx.textContent=d||'Listening…';vtx.classList.toggle('has-text',!!d);document.getElementById('a-text-input').value=d},()=>{if(fuOn)fuRec.start()});

// Detect if returned codes are similar enough to need user selection
// Similar = same ACGME area, or codes within same numeric family (within 20 of each other)
function areSimilar(procs){
  if(procs.length < 2) return false;
  // Same area
  const areas = new Set(procs.map(p=>p.a));
  if(areas.size === 1) return true;
  // Codes in same numeric family (e.g. 15830 and 15847 are both 158xx)
  const families = new Set(procs.map(p=>p.c.slice(0,3)));
  if(families.size === 1) return true;
  return false;
}

  } else {
    box._selected.add(idx);
    el.classList.add('picked');
  }
  // Show confirm button once at least one is selected
  const btn = document.getElementById('cpt-confirm-btn');
  if(box._selected.size > 0){
    btn.classList.add('visible');
    btn.textContent = box._selected.size === 1
      ? 'Confirm 1 code'
      : `Confirm ${box._selected.size} codes`;
  } else {
    btn.classList.remove('visible');
  }
}

function confirmCptSelection(){
  const box = document.getElementById('cpt-select-box');
  if(!box._procs || !box._selected || box._selected.size === 0) return;
  const chosen = [...box._selected].map(i => box._procs[i]);
  caseData.procedures = chosen;
  box.classList.remove('show');
  box.innerHTML = '';
  setStateLabel('');
  showAddMoreScreen();
}

// ── ADD MORE CODES SCREEN ──
let addMoreRec = null, addMoreRecOn = false, addMoreFinal = '', addMoreInt = '';

function showAddMoreScreen(){
  orbState='idle';
  stopMic();
  document.getElementById('orb-hint').classList.remove('hide');
  document.getElementById('q-bubble').classList.remove('show');
  document.getElementById('q-bubble').textContent='';
  setStateLabel('');
  hideAnswerUI();
  document.getElementById('orb-wrap').classList.add('inactive');

  showCptFound(caseData.procedures);

  const alts = caseData.alternatives || [];
  const altsHTML = alts.length ? `
    <div style="font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">Related codes — tap to add</div>
    ${alts.map(s=>`
      <div class="cpt-select-option" style="margin-bottom:6px" onclick="addAltCode('${s.code}','${esc(s.desc)}','${esc(s.area)}')">
        <div style="display:flex;align-items:flex-start;gap:8px">
          <div style="flex:1">
            <div class="cpt-sel-code">${s.code}</div>
            <div class="cpt-sel-name">${s.desc}</div>
            <div class="cpt-sel-note">${s.area}</div>
          </div>
          <div class="radd" style="font-size:20px;color:var(--text3);padding-top:2px">+</div>
        </div>
      </div>`).join('')}
    <div style="height:10px"></div>` : '';

  const box = document.getElementById('add-more-box');
  box.innerHTML = `
    ${altsHTML}
    <div class="add-more-row">
      <button class="add-more-btn" id="add-voice-btn" onclick="startAddMoreVoice()">
        <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1.5 14.9A7.002 7.002 0 0 1 5 9H3a9 9 0 0 0 8 8.94V20H8v2h8v-2h-3v-2.06A9 9 0 0 0 21 9h-2a7 7 0 0 1-5.5 6.9z"/></svg>
        Find more codes
      </button>
      <button class="add-more-btn" onclick="startAddMoreSearch()">
        <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Search codes
      </button>
    </div>
    <div class="cpt-search-box show" id="add-more-search" style="display:none;max-width:100%;margin:0 0 10px">
      <div class="srch-wrap">
        <div class="srch-ico"><svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg></div>
        <input class="srch-field" id="add-more-search-input" placeholder="Search by name or CPT code…" oninput="addMoreSearch(this.value)">
      </div>
      <div class="srch-results" id="add-more-results"></div>
    </div>
    <div id="add-voice-status" style="font-size:13px;color:var(--red);min-height:18px;margin-bottom:10px;text-align:center"></div>
    <button class="done-btn" onclick="doneAddingCodes()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Done
    </button>
  `;
  box.classList.add('show');
  setStateLabel('');
}

function addAltCode(code, desc, area){
  if(!caseData.procedures.find(p=>p.c===code)){
    caseData.procedures.push({c:code,d:desc,a:area});
    // Remove from alternatives
    caseData.alternatives = (caseData.alternatives||[]).filter(s=>s.code!==code);
    showCptFound(caseData.procedures);
    showAddMoreScreen();
    toast('Code added','ok');
  }
}

function renderCodesReview(){
  const el = document.getElementById('codes-review-list');
  if(!el) return;
  el.innerHTML = caseData.procedures.map((p,i) => `
    <div class="codes-review-item">
      <div class="cri-code">${p.c}</div>
      <div class="cri-desc">${p.d}</div>
      <button class="cri-remove" onclick="removeFromReview(${i})">×</button>
    </div>`).join('');
}

function removeFromReview(i){
  caseData.procedures.splice(i,1);
  showCptFound(caseData.procedures);
  renderCodesReview();
}

function startAddMoreSearch(){
  const el = document.getElementById('add-more-search');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
  if(el.style.display !== 'none') setTimeout(()=>document.getElementById('add-more-search-input').focus(), 100);
}

function addMoreSearch(q){
  const res = document.getElementById('add-more-results');
  if(!q.trim()){res.innerHTML='';return}
  const hits = searchCPT(q, 10);
  if(!hits.length){res.innerHTML='<div class="no-results">No results</div>';return}
  res.innerHTML = hits.map(h => `
    <div class="srch-row" onclick="addMoreCode('${h.c}','${esc(h.d)}','${esc(h.a)}')">
      <div class="srch-code">${h.c}</div>
      <div class="srch-info"><div class="srch-desc">${h.d}</div><div class="srch-area">${h.a}</div></div>
      <div class="srch-add">+</div>
    </div>`).join('');
}

function addMoreCode(code, desc, area){
  if(!caseData.procedures.find(p=>p.c===code)){
    caseData.procedures.push({c:code, d:desc, a:area});
    showCptFound(caseData.procedures);
    toast('Code added','ok');
  } else {
    toast('Already added','');
  }
  document.getElementById('add-more-search-input').value = '';
  document.getElementById('add-more-results').innerHTML = '';
}

async function startAddMoreVoice(){
  if(addMoreRecOn){ stopAddMoreVoice(); return; }

  // Hide add-more and found boxes, activate orb
  document.getElementById('add-more-box').classList.remove('show');
  document.getElementById('cpt-found-box').classList.remove('show');
  showBubble('Tell me the procedures you performed.');
  document.getElementById('q-bubble').classList.add('show');

  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    await startMic(stream);
  } catch(e){ toast('Mic access required','err'); return; }

  addMoreFinal=''; addMoreInt='';
  if(!addMoreRec){
    addMoreRec = makeRec(
      e => {
        addMoreInt='';
        for(let i=e.resultIndex;i<e.results.length;i++){
          if(e.results[i].isFinal) addMoreFinal+=' '+e.results[i][0].transcript;
          else addMoreInt+=e.results[i][0].transcript;
        }
        const d=(addMoreFinal+' '+addMoreInt).trim();
        showBubble(d || 'Tell me the procedures you performed.');
      },
      ()=>{ if(addMoreRecOn) addMoreRec.start(); }
    );
  }
  if(!addMoreRec){ toast('Speech not available','err'); return; }
  addMoreRecOn=true; addMoreRec.start();
  orbState='listening';
  document.getElementById('orb-wrap').classList.remove('inactive');
  document.getElementById('orb-hint').classList.add('hide');
  setStateLabel('Tap orb to stop');
}


async function stopAddMoreVoice(){
  addMoreRecOn=false;
  if(addMoreRec) addMoreRec.stop();
  stopMic();

  const text = (addMoreFinal+' '+addMoreInt).trim();
  addMoreFinal=''; addMoreInt='';

  if(!text){
    orbState='idle';
    document.getElementById('q-bubble').classList.remove('show');
    document.getElementById('q-bubble').textContent='';
    document.getElementById('orb-hint').classList.remove('hide');
    setStateLabel('');
    showAddMoreScreen();
    return;
  }

  // Show thinking state while API runs
  orbState='thinking';
  showBubble('Finding codes…');
  document.getElementById('q-bubble').classList.add('show');
  document.getElementById('orb-hint').classList.add('hide');
  setStateLabel('');

  let extracted = null;
  try {
    const res = await fetch('/api/parse-case',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({transcript:text,specialty:'plastic-surgery'})});
    if(!res.ok) throw new Error();
    extracted = await res.json();
  } catch(e) {
    // Fallback: local keyword match
    buildIndex();
    const matched = kwMatch(text);
    orbState='idle';
    document.getElementById('q-bubble').classList.remove('show');
    document.getElementById('orb-hint').classList.remove('hide');
    showAddMoreScreen();
    if(matched.length){
      matched.forEach(e=>{if(!caseData.procedures.find(p=>p.c===e.c))caseData.procedures.push({c:e.c,d:e.d,a:e.a});});
      showCptFound(caseData.procedures);
      toast(`${matched.length} code${matched.length>1?'s':''} added`,'ok');
    } else {
      const searchEl=document.getElementById('add-more-search');
      const searchInput=document.getElementById('add-more-search-input');
      if(searchEl&&searchInput){searchEl.style.display='block';searchInput.value=text;addMoreSearch(text);}
      toast('No exact match — try the search results below','');
    }
    return;
  }

  // Add new primary codes; merge new alternatives
  if(extracted.suggestedCodes && extracted.suggestedCodes.length){
    const primaries = extracted.suggestedCodes.filter(s=>s.primary!==false);
    const alternatives = extracted.suggestedCodes.filter(s=>s.primary===false);
    let added=0;
    primaries.forEach(s=>{
      if(!caseData.procedures.find(p=>p.c===s.code)){
        caseData.procedures.push({c:s.code,d:s.desc,a:s.area});
        added++;
      }
    });
    const existingCodes=new Set(caseData.procedures.map(p=>p.c));
    const newAlts=alternatives.filter(s=>!existingCodes.has(s.code));
    caseData.alternatives=[...(caseData.alternatives||[]),...newAlts].filter(s=>!caseData.procedures.find(p=>p.c===s.code));
    if(added) toast(`${added} code${added>1?'s':''} added`,'ok');
    else toast('Codes already in list','');
  }

  orbState='idle';
  document.getElementById('q-bubble').classList.remove('show');
  document.getElementById('q-bubble').textContent='';
  document.getElementById('orb-hint').classList.remove('hide');
  setStateLabel('');
  showCptFound(caseData.procedures);
  showAddMoreScreen();
}

function doneAddingCodes(){
  document.getElementById('add-more-box').classList.remove('show');
  document.getElementById('add-more-box').innerHTML='';
  document.getElementById('orb-wrap').classList.remove('inactive');
  pendingQs = QUESTIONS.filter(q => q.key!=='procedures' && q.isEmpty());
  currentQ = -1;
  setTimeout(()=>nextQuestion(), 400);
}

function showCptFound(procs){
  const box=document.getElementById('cpt-found-box');
  if(!procs.length){box.classList.remove('show');return}
  box.innerHTML=`<div class="cpt-found-label">&#10022; CPT codes identified (${procs.length})</div>`+procs.map(p=>`<div class="cpt-found-item"><div class="cpt-found-code">${p.c}</div><div class="cpt-found-desc">${p.d}<br><span style="font-size:11px;color:var(--text3)">${p.a}</span></div></div>`).join('');
  box.classList.add('show');
}
function setStateLabel(t){document.getElementById('state-label').textContent=t}
function showSummary(){
  hideAnswerUI();document.getElementById('q-bubble').classList.remove('show');
  const rows=[{l:'Procedure',v:caseData.procedures.map(p=>p.d).join(', ')||''},{l:'Date',v:formatDate(caseData.date)},{l:'Role',v:caseData.role},{l:'Site',v:caseData.site},{l:'Attending',v:caseData.attending},{l:'Patient',v:caseData.patientType},{l:'Year',v:caseData.caseYear}];
  document.getElementById('summary-card').innerHTML=rows.map(r=>`<div class="sum-row"><div class="sum-lbl">${r.l}</div><div class="sum-val ${r.v?'':'empty'}">${r.v||'&#8212;'}</div></div>`).join('');
  setTimeout(()=>{document.getElementById('summary-card').classList.add('show');document.getElementById('final-actions').classList.add('show')},200);
  setStateLabel('Review and submit');
}
let cases=JSON.parse(localStorage.getItem('cf5-cases')||'[]');
async function submitCase(){
  const btn=document.getElementById('go-btn');btn.innerHTML='<span class="spin"></span>Submitting&#8230;';btn.disabled=true;
  await sleep(1800);
  const c={id:Date.now(),date:caseData.date||isoToday(),yr:(caseData.caseYear||'Year 4').replace('Year ',''),role:caseData.role||'Surgeon',site:caseData.site||'',att:caseData.attending||'',pt:caseData.patientType||'Adult',cid:caseData.caseId,notes:caseData.notes,procs:caseData.procedures,status:'submitted',ts:new Date().toISOString()};
  cases.unshift(c);localStorage.setItem('cf5-cases',JSON.stringify(cases));
  document.getElementById('hdr-n').textContent=cases.length;
  btn.innerHTML='Submit to ACGME';btn.disabled=false;
  orbState='done';await sleep(700);orbState='idle';
  toast('Case submitted successfully','ok');resetFlow();
}
function resetFlow(){
  // Destroy all speech recognition objects so they're created fresh next time
  recOn=false;
  if(recObj){try{recObj.abort();}catch(e){} recObj=null;}
  fuOn=false;
  if(fuRec){try{fuRec.abort();}catch(e){} fuRec=null;}
  addMoreRecOn=false;
  if(addMoreRec){try{addMoreRec.abort();}catch(e){} addMoreRec=null;}
  stopMic();
  txFinal='';txInt='';fuFinal='';fuInt='';addMoreFinal='';addMoreInt='';
  caseData={description:'',procedures:[],alternatives:[],role:null,site:null,attending:null,patientType:null,caseYear:null,date:null,caseId:'',notes:''};
  pendingQs=[];currentQ=-1;
  orbState='idle';hideAll();
  document.getElementById('cpt-select-box').innerHTML='';
  document.getElementById('add-more-box').innerHTML='';
  document.getElementById('orb-wrap').classList.remove('inactive');
  document.getElementById('q-bubble').classList.remove('show');document.getElementById('q-bubble').textContent='';
  document.getElementById('orb-hint').classList.remove('hide');setStateLabel('');
  document.getElementById('new-case-btn').style.display='none';
  goTab('log');
}
function renderHistory(){
  const list=document.getElementById('hist-list');
  if(!cases.length){list.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round"/></svg><p>No cases logged yet.<br>Head to Log Case to get started.</p></div>';return}
  list.innerHTML=cases.map(c=>{const procs=c.procs?.length?c.procs.map(p=>p.d).join(', '):'No procedures listed';const d=new Date(c.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});return`<div class="hist-item"><div style="flex:1;min-width:0"><div class="hprocs">${procs}</div><div class="hmeta">${d} &#183; ${c.role} &#183; Year ${c.yr}</div><div class="hmeta">${c.site} &#183; ${c.att}</div></div><div class="spill s-${c.status}">${c.status}</div></div>`}).join('');
}
function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value.trim();
  const err=document.getElementById('l-err');
  if(!email||!pass){err.textContent='Please enter your email and password.';return}
  if(!email.includes('@')){err.textContent='Please enter a valid email address.';return}
  err.textContent='';
  const btn=document.getElementById('l-btn');
  btn.innerHTML='<span class="spin"></span>Signing in\u2026';
  btn.classList.add('busy');
  setTimeout(()=>{
    localStorage.setItem('cf5-email',email);
    btn.innerHTML='Sign In';
    btn.classList.remove('busy');
    launchApp(email);
  },700);
}



function launchApp(email){
  email = email || localStorage.getItem('cf5-email') || '';
  document.getElementById('hdr-u').textContent=email.split('@')[0];
  document.getElementById('hdr-n').textContent=cases.length;
  showPage('pg-app');
  startOrb();
  renderHistory();
}

function doLogout(){if(!confirm('Sign out?'))return;resetFlow();showPage('pg-login')}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.getElementById(id).classList.add('on')}
function goTab(n){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));document.getElementById('tb-'+n).classList.add('on');document.getElementById('pn-'+n).classList.add('on');if(n==='history')renderHistory()}
document.addEventListener('DOMContentLoaded',()=>{
  const saved=localStorage.getItem('cf5-email');
  if(saved) document.getElementById('l-email').value=saved;
  document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
  document.getElementById('l-email').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('l-pass').focus()});
  startOrb();
  function tryBuildIndex(){
    if(typeof CPT_DB!=='undefined'){buildIndex();}
    else{setTimeout(tryBuildIndex,100);}
  }
  setTimeout(tryBuildIndex,200);
});
function isoToday(){return new Date().toISOString().split('T')[0]}
function formatDate(d){if(!d)return'Today';return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function esc(s){return s.replace(/'/g,"\'").replace(/"/g,'&quot;')}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast on '+type;setTimeout(()=>t.className='toast '+type,3200)}
</script>
