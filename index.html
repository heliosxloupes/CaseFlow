<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="CaseFlow">
<title>CaseFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;--bg1:#0d1119;--bg2:#131922;--bg3:#1a2130;
  --line:rgba(255,255,255,0.055);--line2:rgba(255,255,255,0.10);--line3:rgba(255,255,255,0.16);
  --text:#e8edf4;--text2:#6b7d96;--text3:#384557;
  --blue:#4f8ef7;--blue-d:rgba(79,142,247,0.14);--blue-b:rgba(79,142,247,0.22);
  --green:#34d399;--green-d:rgba(52,211,153,0.11);
  --red:#f87171;--amber:#fbbf24;
  --r:12px;--rl:18px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;background:var(--bg)}
body{min-height:100%;font-family:'Sora',sans-serif;color:var(--text);background:var(--bg);overflow-x:hidden}
.page{display:none;min-height:100vh;flex-direction:column}
.page.on{display:flex}
#pg-login{align-items:center;justify-content:center;padding:48px 28px}
.login-wrap{width:100%;max-width:360px}
.brand{text-align:center;margin-bottom:56px}
.brand-name{font-size:34px;font-weight:700;letter-spacing:-2px}
.brand-name em{font-style:normal;color:var(--blue)}
.brand-tag{font-size:11px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-top:7px}
.lbl{display:block;font-size:11px;color:var(--text2);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
.ifield{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);padding:15px 16px;color:var(--text);font-family:'Sora',sans-serif;font-size:15px;outline:none;transition:border-color .18s,background .18s;margin-bottom:13px}
.ifield:focus{border-color:var(--blue);background:var(--bg3)}
.ifield::placeholder{color:var(--text3)}
.btn-main{width:100%;padding:16px;background:var(--blue);border:none;border-radius:var(--r);color:#fff;font-family:'Sora',sans-serif;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:-.2px;transition:opacity .15s,transform .1s;margin-top:4px}
.btn-main:active{opacity:.87;transform:scale(.985)}
.btn-main.busy{opacity:.55;pointer-events:none}
.login-note{text-align:center;margin-top:32px;font-size:12px;color:var(--text3);line-height:1.7}
.login-err{text-align:center;font-size:13px;color:var(--red);margin-top:11px;min-height:18px}
#pg-app{background:var(--bg)}
.app-bar{display:flex;align-items:center;justify-content:space-between;padding:15px 20px 13px;border-bottom:1px solid var(--line);background:rgba(7,9,15,.95);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);position:sticky;top:0;z-index:60}
.app-logo{font-size:19px;font-weight:700;letter-spacing:-1px}
.app-logo em{font-style:normal;color:var(--blue)}
.bar-right{display:flex;align-items:center;gap:9px}
.chip{background:var(--bg2);border:1px solid var(--line2);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2)}
.chip b{color:var(--blue);font-weight:600}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--line2);border-radius:20px;padding:5px 12px 5px 8px;font-size:12px;color:var(--text2);cursor:pointer}
.udot{width:7px;height:7px;background:var(--green);border-radius:50%;flex-shrink:0}
.tabs{display:flex;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:56px;z-index:50}
.tab{flex:1;padding:14px 0;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Sora',sans-serif;transition:color .15s,border-color .15s}
.tab.on{color:var(--text);border-bottom-color:var(--blue)}
.pane{display:none;max-width:480px;margin:0 auto;width:100%}
.pane.on{display:block}
.voice-screen{display:flex;flex-direction:column;align-items:center;min-height:calc(100vh - 112px);padding:32px 24px 40px}
.orb-wrap{position:relative;width:180px;height:180px;margin-bottom:28px;cursor:pointer;flex-shrink:0;transition:transform .2s}
.orb-wrap:active{transform:scale(.96)}
canvas#orb-canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:50%}
.orb-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:5px;pointer-events:none;transition:opacity .3s}
.orb-hint.hide{opacity:0}
.orb-hint svg{width:26px;height:26px;fill:rgba(255,255,255,.45)}
.orb-hint span{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.07em;text-transform:uppercase}
.question-bubble{background:var(--bg2);border:1px solid var(--line2);border-radius:20px 20px 20px 4px;padding:14px 18px;font-size:16px;font-weight:400;color:var(--text);line-height:1.55;text-align:left;max-width:340px;width:100%;margin-bottom:16px;min-height:52px;opacity:0;transform:translateY(6px);transition:opacity .35s,transform .35s}
.question-bubble.show{opacity:1;transform:translateY(0)}
.answer-chips{display:flex;flex-wrap:wrap;gap:8px;max-width:340px;width:100%;margin-bottom:16px;opacity:0;transition:opacity .3s .1s}
.answer-chips.show{opacity:1}
.chip-opt{background:var(--bg2);border:1px solid var(--line2);border-radius:20px;padding:9px 16px;font-size:13px;color:var(--text2);cursor:pointer;font-family:'Sora',sans-serif;font-weight:500;transition:background .15s,border-color .15s,color .15s}
.chip-opt:active,.chip-opt.selected{background:var(--blue-d);border-color:var(--blue);color:var(--blue)}
.answer-input-wrap{display:flex;gap:8px;max-width:340px;width:100%;margin-bottom:16px;opacity:0;transition:opacity .3s .1s}
.answer-input-wrap.show{opacity:1}
.answer-text-input{flex:1;background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);padding:12px 14px;color:var(--text);font-family:'Sora',sans-serif;font-size:15px;outline:none;transition:border-color .18s}
.answer-text-input:focus{border-color:var(--blue)}
.answer-text-input::placeholder{color:var(--text3)}
.send-btn{background:var(--blue);border:none;border-radius:var(--r);padding:12px 16px;cursor:pointer;color:#fff;font-size:18px;transition:opacity .15s}
.send-btn:active{opacity:.8}
.voice-answer-row{display:flex;align-items:center;gap:12px;max-width:340px;width:100%;margin-bottom:12px;opacity:0;transition:opacity .3s .15s}
.voice-answer-row.show{opacity:1}
.mic-small-btn{width:48px;height:48px;border-radius:50%;background:var(--bg3);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;flex-shrink:0}
.mic-small-btn.rec{background:rgba(248,113,113,.12);border-color:var(--red)}
.mic-small-btn svg{width:20px;height:20px;fill:var(--text2);transition:fill .15s}
.mic-small-btn.rec svg{fill:var(--red)}
.voice-answer-tx{flex:1;font-size:14px;color:var(--text2);font-style:italic;min-height:20px;line-height:1.4}
.voice-answer-tx.has-text{color:var(--text);font-style:normal}
.cpt-search-box{max-width:340px;width:100%;margin-bottom:12px;opacity:0;transition:opacity .3s .1s}
.cpt-search-box.show{opacity:1}
.srch-wrap{position:relative}
.srch-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
.srch-ico svg{width:15px;height:15px;fill:var(--text2)}
.srch-field{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;padding:11px 12px 11px 35px;color:var(--text);font-family:'Sora',sans-serif;font-size:14px;outline:none;transition:border-color .18s}
.srch-field:focus{border-color:var(--blue)}
.srch-field::placeholder{color:var(--text3)}
.srch-results{margin-top:8px;max-height:240px;overflow-y:auto;border-radius:var(--r);background:var(--bg2);border:1px solid var(--line2)}
.srch-row{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s}
.srch-row:last-child{border-bottom:none}
.srch-row:active,.srch-row:hover{background:var(--bg3)}
.srch-code{font-size:12px;color:var(--blue);font-weight:600;min-width:46px;padding-top:2px}
.srch-info{flex:1}
.srch-desc{font-size:13px;color:var(--text);line-height:1.35}
.srch-area{font-size:11px;color:var(--text3);margin-top:2px}
.srch-add{font-size:18px;color:var(--text3);padding-top:2px}
.no-results{padding:14px;font-size:13px;color:var(--text3);text-align:center}
.srch-count{padding:8px 14px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--line)}
.cpt-found-box{background:var(--blue-d);border:1px solid var(--blue-b);border-radius:var(--r);padding:14px 16px;max-width:340px;width:100%;margin-bottom:12px;opacity:0;transition:opacity .3s}
.cpt-found-box.show{opacity:1}
.cpt-found-label{font-size:10px;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:10px}
.cpt-found-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.cpt-found-item:last-child{border-bottom:none}
.cpt-found-code{font-size:12px;font-weight:600;color:var(--blue);min-width:46px;padding-top:2px}
.cpt-found-desc{flex:1;font-size:13px;color:var(--text);line-height:1.35}
.state-label{font-size:13px;color:var(--text3);margin-top:4px;min-height:18px;letter-spacing:.02em}
.summary-card{background:var(--bg1);border:1px solid var(--line);border-radius:var(--rl);overflow:hidden;max-width:340px;width:100%;margin-bottom:16px;opacity:0;transition:opacity .4s}
.summary-card.show{opacity:1}
.sum-row{display:flex;align-items:flex-start;padding:12px 16px;border-bottom:1px solid var(--line);gap:12px}
.sum-row:last-child{border-bottom:none}
.sum-lbl{font-size:11px;color:var(--text3);min-width:80px;padding-top:2px;flex-shrink:0}
.sum-val{font-size:14px;color:var(--text);flex:1;font-weight:500;line-height:1.4}
.sum-val.empty{color:var(--text3);font-weight:400;font-style:italic}
.final-actions{display:flex;gap:10px;max-width:340px;width:100%;margin-top:4px;opacity:0;transition:opacity .3s .1s}
.final-actions.show{opacity:1}
.btn-redo{flex:1;padding:14px;background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);color:var(--text2);font-family:'Sora',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
.btn-go{flex:2;padding:14px;background:var(--green);border:none;border-radius:var(--r);color:#071a10;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-go:active{opacity:.85}
.btn-go:disabled{opacity:.35;pointer-events:none}
.hist-wrap{padding:20px 20px 40px}
.hist-item{background:var(--bg1);border:1px solid var(--line);border-radius:var(--rl);padding:16px 18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start}
.hprocs{font-size:14px;font-weight:500;margin-bottom:5px;line-height:1.4}
.hmeta{font-size:12px;color:var(--text2);line-height:1.75}
.spill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;margin-left:12px;flex-shrink:0}
.s-submitted{background:var(--green-d);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.empty{text-align:center;padding:60px 20px}
.empty svg{width:44px;height:44px;margin:0 auto 14px;opacity:.12;display:block}
.empty p{font-size:14px;color:var(--text3);line-height:1.65}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:rot .65s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes rot{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--bg3);border:1px solid var(--line2);border-radius:24px;padding:11px 20px;font-size:13px;color:var(--text);font-weight:500;opacity:0;transition:all .22s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(52,211,153,.28);color:var(--green)}
.toast.err{border-color:rgba(248,113,113,.28);color:var(--red)}
</style>
</head>
<body>
<div class="page on" id="pg-login">
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-name">Case<em>Flow</em></div>
      <div class="brand-tag">ACGME Case Logging</div>
    </div>
    <label class="lbl">Email</label>
    <input class="ifield" type="email" id="l-email" placeholder="you@hospital.com" autocomplete="email" autocapitalize="none">
    <label class="lbl">Password</label>
    <input class="ifield" type="password" id="l-pass" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;" autocomplete="current-password">
    <button class="btn-main" id="l-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="l-err"></div>
    <div class="login-note">Sign in with your ACGME credentials.<br>Your session is stored locally on this device.</div>
  </div>
</div>
<div class="page" id="pg-app">
  <div class="app-bar">
    <div class="app-logo">Case<em>Flow</em></div>
    <div class="bar-right">
      <div class="chip"><b id="hdr-n">0</b> cases</div>
      <div class="user-chip" onclick="doLogout()"><div class="udot"></div><span id="hdr-u">&#8212;</span></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tb-log" onclick="goTab('log')">Log Case</button>
    <button class="tab" id="tb-history" onclick="goTab('history')">History</button>
  </div>
  <div class="pane on" id="pn-log">
    <div class="voice-screen" id="voice-screen">
      <div class="orb-wrap" id="orb-wrap" onclick="handleOrbTap()">
        <canvas id="orb-canvas" width="360" height="360"></canvas>
        <div class="orb-hint" id="orb-hint">
          <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1.5 14.9A7.002 7.002 0 0 1 5 9H3a9 9 0 0 0 8 8.94V20H8v2h8v-2h-3v-2.06A9 9 0 0 0 21 9h-2a7 7 0 0 1-5.5 6.9z"/></svg>
          <span>Tap to start</span>
        </div>
      </div>
      <div class="question-bubble" id="q-bubble"></div>
      <div class="answer-chips" id="a-chips"></div>
      <div class="cpt-search-box" id="cpt-search-box">
        <div class="srch-wrap">
          <div class="srch-ico"><svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg></div>
          <input class="srch-field" id="cpt-search-input" placeholder="Type procedure name or CPT code&#8230;" oninput="liveSearch(this.value)">
        </div>
        <div class="srch-results" id="srch-results-box"></div>
      </div>
      <div class="answer-input-wrap" id="a-text-wrap">
        <input class="answer-text-input" id="a-text-input" placeholder="Type your answer&#8230;" onkeydown="if(event.key==='Enter')submitTextAnswer()">
        <button class="send-btn" onclick="submitTextAnswer()">&#8593;</button>
      </div>
      <div class="voice-answer-row" id="a-voice-row">
        <div class="mic-small-btn" id="mic-small" onclick="toggleFollowUpRec()">
          <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1.5 14.9A7.002 7.002 0 0 1 5 9H3a9 9 0 0 0 8 8.94V20H8v2h8v-2h-3v-2.06A9 9 0 0 0 21 9h-2a7 7 0 0 1-5.5 6.9z"/></svg>
        </div>
        <div class="voice-answer-tx" id="a-voice-tx">Tap mic or type above</div>
      </div>
      <div class="cpt-found-box" id="cpt-found-box"></div>
      <div class="state-label" id="state-label"></div>
      <div class="summary-card" id="summary-card"></div>
      <div class="final-actions" id="final-actions">
        <button class="btn-redo" onclick="resetFlow()">Start Over</button>
        <button class="btn-go" id="go-btn" onclick="submitCase()">Submit to ACGME</button>
      </div>
    </div>
  </div>
  <div class="pane" id="pn-history">
    <div class="hist-wrap" id="hist-list"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

// Build lookup index
let CPT_INDEX=null;
function buildIndex(){
  if(CPT_INDEX)return;
  CPT_INDEX=CPT_DB.map(([c,d,a])=>({c,d,a,search:(c+' '+d+' '+a).toLowerCase()}));
}
function searchCPT(query,limit=12){
  buildIndex();
  const q=query.toLowerCase().trim();
  if(!q)return[];
  const terms=q.split(/\s+/);
  const results=[];
  for(const entry of CPT_INDEX){
    if(entry.c===q){results.unshift(entry);continue}
    if(terms.every(t=>entry.search.includes(t))){
      results.push(entry);
    }
  }
  return results.slice(0,limit);
}
function kwMatch(text){
  const lo=text.toLowerCase();
  const matched=[];
  buildIndex();
  for(const[type,codes]of Object.entries(KW_MAP)){
    const typeWords=type.toLowerCase().split(/[\s\/,()+\-]+/).filter(w=>w.length>3);
    if(typeWords.some(w=>lo.includes(w))){
      for(const code of codes.slice(0,3)){
        const e=CPT_INDEX.find(x=>x.c===code);
        if(e&&!matched.find(m=>m.c===code))matched.push(e);
      }
    }
  }
  return matched.slice(0,5);
}

  ctx.globalAlpha=1;
}
function readMic(){if(!analyser){audioLevel=0;return}analyser.getByteFrequencyData(dataArray);let s=0;for(let i=0;i<dataArray.length;i++)s+=dataArray[i];audioLevel=Math.min(1,(s/dataArray.length)/55)}
function orbLoop(ts){
  const dt=Math.min(ts-lastTs,50)/1000;lastTs=ts;readMic();
  const tgt=orbState==='listening'?audioLevel:orbState==='thinking'?.4+Math.sin(ts*.003)*.3:0;
  smoothLevel+=(tgt-smoothLevel)*(orbState==='listening'?.3:.07);
  const spd=orbState==='listening'?.004:orbState==='thinking'?.006:.001;
  for(let i=0;i<N;i++)bAngles[i]+=spd*(i%2===0?1:-1)*(1+smoothLevel*.5);
  drawOrb(ts);animFrame=requestAnimationFrame(orbLoop);
}
function startOrb(){if(animFrame)cancelAnimationFrame(animFrame);lastTs=performance.now();animFrame=requestAnimationFrame(orbLoop)}
// MIC
let micStream=null,audioCtx2=null;
async function startMic(stream){
  micStream=stream;audioCtx2=new(window.AudioContext||window.webkitAudioContext)();
  const src=audioCtx2.createMediaStreamSource(stream);
  analyser=audioCtx2.createAnalyser();analyser.fftSize=64;
  dataArray=new Uint8Array(analyser.frequencyBinCount);src.connect(analyser);
}
function stopMic(){if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null}if(audioCtx2){audioCtx2.close();audioCtx2=null}analyser=null;dataArray=null;audioLevel=0}
// SPEECH
let recObj=null,recOn=false,txFinal='',txInt='';
let fuRec=null,fuOn=false,fuFinal='',fuInt='';
function makeRec(onResult,onEnd){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();r.continuous=true;r.interimResults=true;r.lang='en-US';
  r.onresult=onResult;
  r.onerror=e=>{if(e.error==='not-allowed'||e.error==='permission-denied')toast('Mic access denied — allow mic in browser settings','err');else if(e.error!=='no-speech')toast('Mic error: '+e.error,'err')};
  if(onEnd)r.onend=onEnd;return r;
}
// CONVERSATION
let caseData={description:'',procedures:[],role:null,site:null,attending:null,patientType:null,caseYear:null,date:null,caseId:'',notes:''};
let pendingQs=[],currentQ=-1;
const QUESTIONS=[
  {key:'procedures',isEmpty:()=>caseData.procedures.length===0,question:"I couldn't identify the procedure. What was performed? Search by name or CPT code.",type:'cpt-search'},
  {key:'role',isEmpty:()=>!caseData.role,question:'What was your role in this case?',type:'chips',options:['Surgeon','Assistant','Teaching Assistant','Observer']},
  {key:'site',isEmpty:()=>!caseData.site,question:'At which hospital or site was this performed?',type:'chips',options:['Larkin Community Hospital','Larkin Palm Springs','Affiliated Site']},
  {key:'attending',isEmpty:()=>!caseData.attending,question:'Who was the attending physician?',type:'chips',options:['Dr. Smith','Dr. Johnson','Dr. Williams','Dr. Brown']},
  {key:'patientType',isEmpty:()=>!caseData.patientType,question:'Was this an adult or pediatric patient?',type:'chips',options:['Adult','Pediatric']},
  {key:'caseYear',isEmpty:()=>!caseData.caseYear,question:'What year of residency are you in?',type:'chips',options:['Year 1','Year 2','Year 3','Year 4','Year 5','Year 6']},
];
async function handleOrbTap(){if(orbState==='idle')await startInitialListening();else if(orbState==='listening')stopInitialListening()}
async function startInitialListening(){
  try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});await startMic(stream)}
  catch(e){toast('Microphone access required — allow mic and try again','err');return}
  buildIndex();
  if(!recObj)recObj=makeRec(e=>{txInt='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)txFinal+=' '+e.results[i][0].transcript;else txInt+=e.results[i][0].transcript}showBubble((txFinal+' '+txInt).trim()||'Listening…')},()=>{if(recOn)recObj.start()});
  if(!recObj){toast('Speech recognition not available','err');return}
  txFinal='';txInt='';recOn=true;recObj.start();
  orbState='listening';document.getElementById('orb-hint').classList.add('hide');
  showBubble('Describe your case…');setStateLabel('Tap orb to stop');hideAll();
  document.getElementById('q-bubble').classList.add('show');
}
function stopInitialListening(){
  recOn=false;if(recObj)recObj.stop();stopMic();
  const text=(txFinal+' '+txInt).trim();
  if(!text){orbState='idle';document.getElementById('orb-hint').classList.remove('hide');showBubble('');setStateLabel('');return}
  orbState='thinking';showBubble('Finding your CPT codes…');setStateLabel('');
  processDescription(text);
}
async function processDescription(text){
  caseData.description=text;caseData.date=isoToday();buildIndex();
  let extracted=null;
  try{const res=await fetch('/api/parse-case',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({transcript:text})});if(!res.ok)throw new Error();extracted=await res.json()}
  catch(e){extracted=localExtract(text)}
  if(extracted.role)caseData.role=extracted.role;
  if(extracted.patientType)caseData.patientType=extracted.patientType;
  if(extracted.caseYear)caseData.caseYear='Year '+(extracted.caseYear||4);
  if(extracted.notes)caseData.notes=extracted.notes;
  if(extracted.suggestedCodes&&extracted.suggestedCodes.length)caseData.procedures=extracted.suggestedCodes.map(s=>({c:s.code,d:s.desc,a:s.area}));
  orbState='idle';
  if(caseData.procedures.length)showCptFound(caseData.procedures);
  pendingQs=QUESTIONS.filter(q=>q.isEmpty());currentQ=-1;
  await sleep(caseData.procedures.length?1000:100);nextQuestion();
}
function localExtract(text){
  const lo=text.toLowerCase();
  const role=lo.includes('assist')?'Assistant':lo.includes('observer')?'Observer':'Surgeon';
  const pt=(lo.includes('pediatric')||lo.includes('child')||lo.includes('infant'))?'Pediatric':'Adult';
  const matched=kwMatch(lo);
  return{role,patientType:pt,caseYear:4,suggestedCodes:matched.map(e=>({code:e.c,desc:e.d,area:e.a}))};
}
function nextQuestion(){
  currentQ++;if(currentQ>=pendingQs.length){showSummary();return}
  const q=pendingQs[currentQ];hideAnswerUI();
  setTimeout(()=>{
    showBubble(q.question);document.getElementById('q-bubble').classList.add('show');
    if(q.type==='chips')showChips(q.options);
    else if(q.type==='cpt-search')showCptSearchPanel();
    else showTextAndVoice();
  },320);
}
function answerQuestion(value){
  const q=pendingQs[currentQ];if(!q)return;
  if(q.key==='caseYear')caseData.caseYear=value;else caseData[q.key]=value;
  hideAnswerUI();nextQuestion();
}
function showCptSearchPanel(){
  const box=document.getElementById('cpt-search-box');
  box.classList.add('show');
  document.getElementById('srch-results-box').innerHTML='';
  document.getElementById('cpt-search-input').value='';
  setTimeout(()=>document.getElementById('cpt-search-input').focus(),200);
}
function liveSearch(q){
  const box=document.getElementById('srch-results-box');
  if(!q.trim()){box.innerHTML='';return}
  const hits=searchCPT(q,12);
  if(!hits.length){box.innerHTML='<div class="no-results">No results — try a different term</div>';return}
  box.innerHTML=`<div class="srch-count">${hits.length} result${hits.length!==1?'s':''} — tap to add</div>`
    +hits.map(h=>`<div class="srch-row" onclick="addCptFromSearch('${h.c}','${esc(h.d)}','${esc(h.a)}')"><div class="srch-code">${h.c}</div><div class="srch-info"><div class="srch-desc">${h.d}</div><div class="srch-area">${h.a}</div></div><div class="srch-add">+</div></div>`).join('');
}
function addCptFromSearch(code,desc,area){
  if(!caseData.procedures.find(p=>p.c===code)){caseData.procedures.push({c:code,d:desc,a:area});showCptFound(caseData.procedures)}
  else toast('Code already added','');
  hideAnswerUI();nextQuestion();
}
function toggleFollowUpRec(){fuOn?stopFuRec():startFuRec()}
function startFuRec(){
  fuFinal='';fuInt='';
  if(!fuRec)fuRec=makeRec(e=>{fuInt='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fuFinal+=' '+e.results[i][0].transcript;else fuInt+=e.results[i][0].transcript}const d=(fuFinal+' '+fuInt).trim();const vtx=document.getElementById('a-voice-tx');vtx.textContent=d||'Listening…';vtx.classList.toggle('has-text',!!d);document.getElementById('a-text-input').value=d},()=>{if(fuOn)fuRec.start()});
  if(!fuRec)return;fuOn=true;fuRec.start();
  document.getElementById('mic-small').classList.add('rec');
  document.getElementById('a-voice-tx').textContent='Listening…';
}
function stopFuRec(){
  fuOn=false;if(fuRec)fuRec.stop();document.getElementById('mic-small').classList.remove('rec');
  const val=(fuFinal+' '+fuInt).trim();
  if(val){document.getElementById('a-voice-tx').textContent=val;document.getElementById('a-voice-tx').classList.add('has-text');document.getElementById('a-text-input').value=val;setTimeout(()=>submitTextAnswer(),350)}
  else{document.getElementById('a-voice-tx').textContent='Tap mic or type above';document.getElementById('a-voice-tx').classList.remove('has-text')}
}
function submitTextAnswer(){const val=document.getElementById('a-text-input').value.trim();if(!val)return;document.getElementById('a-text-input').value='';answerQuestion(val)}
function showBubble(text){const el=document.getElementById('q-bubble');el.textContent=text;if(text)el.classList.add('show')}
function hideAnswerUI(){
  document.getElementById('a-chips').classList.remove('show');
  document.getElementById('a-text-wrap').classList.remove('show');
  document.getElementById('a-voice-row').classList.remove('show');
  document.getElementById('cpt-search-box').classList.remove('show');
  document.getElementById('a-text-input').value='';
  document.getElementById('a-voice-tx').textContent='Tap mic or type above';
  document.getElementById('a-voice-tx').classList.remove('has-text');
  document.getElementById('srch-results-box').innerHTML='';
  if(fuOn)stopFuRec();
}
function hideAll(){hideAnswerUI();document.getElementById('cpt-found-box').classList.remove('show');document.getElementById('summary-card').classList.remove('show');document.getElementById('final-actions').classList.remove('show')}
function showChips(opts){const el=document.getElementById('a-chips');el.innerHTML=opts.map(o=>`<div class="chip-opt" onclick="chipPick('${o}',this)">${o}</div>`).join('');el.classList.add('show');document.getElementById('a-voice-row').classList.add('show')}
function showTextAndVoice(){document.getElementById('a-text-wrap').classList.add('show');document.getElementById('a-voice-row').classList.add('show');setTimeout(()=>document.getElementById('a-text-input').focus(),200)}
function chipPick(val,el){document.querySelectorAll('.chip-opt').forEach(c=>c.classList.remove('selected'));el.classList.add('selected');setTimeout(()=>answerQuestion(val),220)}
function showCptFound(procs){
  const box=document.getElementById('cpt-found-box');
  if(!procs.length){box.classList.remove('show');return}
  box.innerHTML=`<div class="cpt-found-label">&#10022; CPT codes identified (${procs.length})</div>`+procs.map(p=>`<div class="cpt-found-item"><div class="cpt-found-code">${p.c}</div><div class="cpt-found-desc">${p.d}<br><span style="font-size:11px;color:var(--text3)">${p.a}</span></div></div>`).join('');
  box.classList.add('show');
}
function setStateLabel(t){document.getElementById('state-label').textContent=t}
function showSummary(){
  hideAnswerUI();document.getElementById('q-bubble').classList.remove('show');
  const rows=[{l:'Procedure',v:caseData.procedures.map(p=>p.d).join(', ')||''},{l:'Date',v:formatDate(caseData.date)},{l:'Role',v:caseData.role},{l:'Site',v:caseData.site},{l:'Attending',v:caseData.attending},{l:'Patient',v:caseData.patientType},{l:'Year',v:caseData.caseYear}];
  document.getElementById('summary-card').innerHTML=rows.map(r=>`<div class="sum-row"><div class="sum-lbl">${r.l}</div><div class="sum-val ${r.v?'':'empty'}">${r.v||'&#8212;'}</div></div>`).join('');
  setTimeout(()=>{document.getElementById('summary-card').classList.add('show');document.getElementById('final-actions').classList.add('show')},200);
  setStateLabel('Review and submit');
}
let cases=JSON.parse(localStorage.getItem('cf5-cases')||'[]');
async function submitCase(){
  const btn=document.getElementById('go-btn');btn.innerHTML='<span class="spin"></span>Submitting&#8230;';btn.disabled=true;
  await sleep(1800);
  const c={id:Date.now(),date:caseData.date||isoToday(),yr:(caseData.caseYear||'Year 4').replace('Year ',''),role:caseData.role||'Surgeon',site:caseData.site||'',att:caseData.attending||'',pt:caseData.patientType||'Adult',cid:caseData.caseId,notes:caseData.notes,procs:caseData.procedures,status:'submitted',ts:new Date().toISOString()};
  cases.unshift(c);localStorage.setItem('cf5-cases',JSON.stringify(cases));
  document.getElementById('hdr-n').textContent=cases.length;
  btn.innerHTML='Submit to ACGME';btn.disabled=false;
  orbState='done';await sleep(700);orbState='idle';
  toast('Case submitted successfully','ok');resetFlow();
}
function resetFlow(){
  caseData={description:'',procedures:[],role:null,site:null,attending:null,patientType:null,caseYear:null,date:null,caseId:'',notes:''};
  pendingQs=[];currentQ=-1;txFinal='';txInt='';recOn=false;if(recObj)recObj.stop();stopMic();
  orbState='idle';hideAll();
  document.getElementById('q-bubble').classList.remove('show');document.getElementById('q-bubble').textContent='';
  document.getElementById('orb-hint').classList.remove('hide');setStateLabel('');
}
function renderHistory(){
  const list=document.getElementById('hist-list');
  if(!cases.length){list.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round"/></svg><p>No cases logged yet.<br>Head to Log Case to get started.</p></div>';return}
  list.innerHTML=cases.map(c=>{const procs=c.procs?.length?c.procs.map(p=>p.d).join(', '):'No procedures listed';const d=new Date(c.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});return`<div class="hist-item"><div style="flex:1;min-width:0"><div class="hprocs">${procs}</div><div class="hmeta">${d} &#183; ${c.role} &#183; Year ${c.yr}</div><div class="hmeta">${c.site} &#183; ${c.att}</div></div><div class="spill s-${c.status}">${c.status}</div></div>`}).join('');
}
function doLogin(){
  const email=document.getElementById('l-email').value.trim();const pass=document.getElementById('l-pass').value.trim();const err=document.getElementById('l-err');
  if(!email||!pass){err.textContent='Please enter your email and password.';return}
  if(!email.includes('@')){err.textContent='Please enter a valid email address.';return}
  err.textContent='';const btn=document.getElementById('l-btn');
  btn.innerHTML='<span class="spin"></span>Signing in&#8230;';btn.classList.add('busy');
  setTimeout(()=>{localStorage.setItem('cf5-email',email);document.getElementById('hdr-u').textContent=email.split('@')[0];document.getElementById('hdr-n').textContent=cases.length;btn.innerHTML='Sign In';btn.classList.remove('busy');showPage('pg-app');startOrb();renderHistory();},700);
}
function doLogout(){if(!confirm('Sign out?'))return;resetFlow();showPage('pg-login')}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.getElementById(id).classList.add('on')}
function goTab(n){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));document.getElementById('tb-'+n).classList.add('on');document.getElementById('pn-'+n).classList.add('on');if(n==='history')renderHistory()}
document.addEventListener('DOMContentLoaded',()=>{
  const saved=localStorage.getItem('cf5-email');if(saved)document.getElementById('l-email').value=saved;
  document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
  document.getElementById('l-email').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('l-pass').focus()});
  startOrb();setTimeout(buildIndex,1500);
});
function isoToday(){return new Date().toISOString().split('T')[0]}
function formatDate(d){if(!d)return'Today';return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function esc(s){return s.replace(/'/g,"\'").replace(/"/g,'&quot;')}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast on '+type;setTimeout(()=>t.className='toast '+type,3200)}
</script>
